#admin.setRole(Role.ADMIN);
#userRepository.save(admin);
#}
#he Logic Is Simply:
#Who registers?	How?	Role assigned
#Regular users	Via registration form	ROLE_EMPLOYEE (hardcoded in frontend)
#Admin	Via DataInitializer on server startup	ROLE_ADMIN (hardcoded in backend)
#Summary
#DataInitializer runs once at startup and only asks:
#
#"Does admin@ems.com already exist in the database? No? Then create it."
#
#It never modifies any other user. Every other user who registers through the \
#  form gets ROLE_EMPLOYEE as before. There is no problem.


# ── Default Admin User (seeded by DataInitializer on startup) ──────────────
# Change these credentials before deploying to production!
app.admin.email=admin@ems.com
app.admin.password=Admin@1234