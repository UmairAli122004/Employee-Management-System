<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Create an Account</h2>
            <form id="registerForm" autocomplete="off">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Create a password" required>
                </div>
                <button type="submit" id="registerBtn" class="btn btn-primary">
                    <span id="registerBtnText">Register</span>
                    <span id="registerSpinner" class="btn-spinner hidden"></span>
                </button>
                
                <p id="errorMsg" class="error-msg hidden"></p>
                <p id="successMsg" class="success-msg hidden"></p>
            </form>

            <div class="mt-1">
                <span class="text-muted">Already have an account?</span>
                <a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: 500;">Login here</a>
            </div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
